name: Validate & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Check if CI should be skipped
  check-skip:
    name: Check skip conditions
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - name: Check for skip conditions
        id: skip_check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          
          # Skip if commit message contains [skip ci], [ci skip], or [no ci]
          if [[ "$COMMIT_MSG" =~ \[skip\ ci\]|\[ci\ skip\]|\[no\ ci\] ]]; then
            echo "should_skip=true" >> $GITHUB_OUTPUT
            echo "Skipping CI: found skip tag in commit message"
            exit 0
          fi
          
          # Skip if commit message starts with chore:
          if [[ "$COMMIT_MSG" =~ ^chore(\(.+\))?:  ]]; then
            echo "should_skip=true" >> $GITHUB_OUTPUT
            echo "Skipping CI: chore commit"
            exit 0
          fi
          
          echo "should_skip=false" >> $GITHUB_OUTPUT
          echo "CI will run"

  validate:
    name: Validate configs
    runs-on: ubuntu-latest
    needs: check-skip
    if: needs.check-skip.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Validate docker-compose.yml
        run: |
          docker compose --env-file .env.example config --quiet

      - name: Install Caddy
        run: |
          sudo apt-get install -y debian-keyring debian-archive-keyring apt-transport-https curl
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | sudo gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | sudo tee /etc/apt/sources.list.d/caddy-stable.list
          sudo apt-get update
          sudo apt-get install caddy

      - name: Validate Caddyfile
        run: caddy fmt --diff caddy/Caddyfile && echo "Caddyfile OK"

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate kong.yml
        run: yamllint -d relaxed volumes/kong/kong.yml && echo "kong.yml OK"

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [check-skip, validate]
    if: github.ref == 'refs/heads/main' && needs.check-skip.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@a6f90b1f127823b31d4d4a8d96047790581349bd  # v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        env:
          VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_HOST_KEY" >> ~/.ssh/known_hosts

      - name: Backup current configs on VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" '
            set -e
            INFRA=/home/deploy/infra
            cd "$INFRA"
            [ -f docker-compose.yml ] && cp docker-compose.yml docker-compose.yml.backup || true
            [ -f caddy/Caddyfile ] && cp caddy/Caddyfile caddy/Caddyfile.backup || true
            [ -f .env ] && cp .env .env.backup || true
            echo "Backup complete"
          '

      - name: Install rsync
        run: sudo apt-get install -y rsync

      - name: Sync config files to VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='.git/' \
            --exclude='docs/' \
            --exclude='*.backup' \
            -e "ssh" \
            ./ \
            "$VPS_USER@$VPS_HOST":/home/deploy/infra/

      - name: Write .env on VPS from repository variables
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          REPO_VARS_JSON: ${{ toJSON(vars) }}
        run: |
          tmp_env_file=$(mktemp)

          jq -r 'to_entries | .[] | "\(.key)=\(.value)"' <<<"$REPO_VARS_JSON" > "$tmp_env_file"

          ssh "$VPS_USER@$VPS_HOST" \
            "cat > /home/deploy/infra/.env.tmp && mv /home/deploy/infra/.env.tmp /home/deploy/infra/.env" \
            < "$tmp_env_file"

          rm -f "$tmp_env_file"

      - name: Restart Docker stack
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" '
            set -e
            cd /home/deploy/infra
            docker compose --profile supabase up -d --remove-orphans --pull missing
            echo "Stack restarted"
          '

      - name: Health check services
        id: healthcheck
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" '
            set -e
            cd /home/deploy/infra
            EXPECTED_SERVICES="postgres redis kong auth rest realtime storage imgproxy meta functions studio analytics supavisor caddy"
            MAX_RETRIES=15
            SLEEP_SECS=10

            for i in $(seq 1 $MAX_RETRIES); do
              echo "Health check attempt $i/$MAX_RETRIES..."
              ALL_HEALTHY=true

              for svc in $EXPECTED_SERVICES; do
                CID=$(docker compose --profile supabase ps -q "$svc" 2>/dev/null)
                if [[ -z "$CID" ]]; then
                  echo "Service not found: $svc"
                  ALL_HEALTHY=false
                  continue
                fi
                STATE=$(docker inspect --format="{{.State.Status}}" "$CID" 2>/dev/null || echo "unknown")
                HEALTH=$(docker inspect --format="{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}" "$CID" 2>/dev/null || echo "unknown")
                if [[ "$STATE" != "running" ]] || [[ "$HEALTH" != "healthy" && "$HEALTH" != "none" ]]; then
                  echo "Service not healthy: $svc — state: $STATE, health: $HEALTH"
                  ALL_HEALTHY=false
                fi
              done

              if $ALL_HEALTHY; then
                echo "All services healthy"
                exit 0
              fi

              sleep $SLEEP_SECS
            done

            echo "Health check failed after $MAX_RETRIES attempts"
            exit 1
          '

